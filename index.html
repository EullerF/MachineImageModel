<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 - Reconhecimento de Imagem com IA</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; padding: 50px; text-align: center; }
        #webcam-container { margin-top: 20px; border: 5px solid #dee2e6; display: inline-block; border-radius: 10px; overflow: hidden; }
        #label-container { margin-top: 15px; font-size: 1.5rem; font-weight: bold; color: #343a40; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="display-4">Exemplo de treinamento de IA</h1>
        <p class="lead">Exemplo prático de Reconhecimento de Padrões e Aprendizado de Máquina.</p>
        <hr>
        
        <div class="card shadow-sm p-4">
            <h3>Como testar:</h3>
            <p>Clique no botão abaixo para ativar sua webcam. <br> 
            <strong>Atenção:</strong> Você precisará autorizar o acesso à câmera no seu navegador para que a IA possa "ver" e analisar os padrões em tempo real.</p>
            
            <button type="button" class="btn btn-primary btn-lg" onclick="init()">
                🚀 Iniciar Câmera e IA
            </button>
        </div>

        <div id="webcam-container"></div>
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        //const URL = "https://teachablemachine.withgoogle.com/models/5yNbKNS9N/";//- Ruim
        const URL = "https://teachablemachine.withgoogle.com/models/AFSmFttZB/";//- OK

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            // Carregando o modelo
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Configuração da Webcam
            const flip = true; 
            webcam = new tmImage.Webcam(350, 350, flip); // Aumentei um pouco o tamanho
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            // Adicionando o vídeo na tela
            document.getElementById("webcam-container").innerHTML = ""; // Limpa texto antes de colocar vídeo
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; // Limpa labels antigos
            for (let i = 0; i < maxPredictions; i++) {
                labelContainer.appendChild(document.createElement("div"));
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction =
                    prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                labelContainer.childNodes[i].innerHTML = classPrediction;
            }
        }
    </script>

</body>
</html>
