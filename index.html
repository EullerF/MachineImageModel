<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01 - Visualização de Machine Learning</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body { background-color: #f8f9fa; padding: 50px; text-align: center; }
        #webcam-container { margin-top: 20px; border: 5px solid #dee2e6; display: inline-block; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        #label-container { margin: 20px auto; max-width: 400px; text-align: left; }
        .class-label { font-weight: bold; margin-bottom: 5px; display: block; }
        .progress { height: 25px; margin-bottom: 15px; border-radius: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="display-4">Monitoramento de Probabilidade IA</h1>
        <p class="lead">Veja em tempo real como a rede neural calcula a confiança de cada padrão.</p>
        <hr>
        
        <div class="card shadow-sm p-4 mb-4">
            <h3>Instruções:</h3>
            <p>Inicie a câmera e observe as barras abaixo. Elas representam o nível de certeza da IA.</p>
            <button type="button" class="btn btn-primary btn-lg" onclick="init()">
                🚀 Iniciar Câmera e IA
            </button>
        </div>

        <div id="webcam-container"></div>
        
        <div id="label-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        const URL = "https://teachablemachine.withgoogle.com/models/xIkra3eqI/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(350, 350, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").innerHTML = ""; 
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            
            labelContainer = document.getElementById("label-container");
            labelContainer.innerHTML = ""; 

            // Criamos a estrutura da barra para cada classe treinada
            for (let i = 0; i < maxPredictions; i++) {
                const classDiv = document.createElement("div");
                classDiv.innerHTML = `
                    <span class="class-label" id="label-${i}">Classe...</span>
                    <div class="progress">
                        <div id="bar-${i}" class="progress-bar progress-bar-striped progress-bar-animated bg-success" 
                             role="progressbar" style="width: 0%">0%</div>
                    </div>
                `;
                labelContainer.appendChild(classDiv);
            }
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            for (let i = 0; i < maxPredictions; i++) {
                const percentage = (prediction[i].probability * 100).toFixed(0);
                const bar = document.getElementById(`bar-${i}`);
                const label = document.getElementById(`label-${i}`);

                // Atualiza o texto e a largura da barra
                label.innerHTML = prediction[i].className;
                bar.style.width = percentage + "%";
                bar.innerHTML = percentage + "%";

                // Troca a cor se a confiança for baixa (Abaixo de 50% fica amarelo/laranja)
                if (percentage < 50) {
                    bar.className = "progress-bar bg-warning";
                } else {
                    bar.className = "progress-bar progress-bar-striped progress-bar-animated bg-success";
                }
            }
        }
    </script>

</body>
</html>
